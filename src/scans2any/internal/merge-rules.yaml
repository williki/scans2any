# Automatic merge conflict solving
#
# If any of the listed combinations of service names [and port] (e.g. `http` and
# `www`) are found as service names for the same port, the key is used as the
# conflict-solving service name. Rules are applied in order; once a rule matches
# and rewrites service names, later rules see the updated names.
auto-merge:

# ── OS Rules ─────────────────────────────────────────────────────────────────
# When multiple conflicting OS identifiers are detected, resolve to "unknown".
  - os: [bsd, linux]
    key: [unknown]
  - os: [bsd, windows]
    key: [unknown]
  - os: [bsd, macos]
    key: [unknown]
  - os: [macos, linux]
    key: [unknown]
  - os: [macos, windows]
    key: [unknown]
  - os: [windows, linux]
    key: [unknown]

# ── HTTP / HTTPS / Web ───────────────────────────────────────────────────────
# Port-specific rules first, catch-all last.
  - service-names: [http, www]
    key: [http]
  - service-names: [https, www]
    key: [https]
  - service-names: [http, https, www]
    port: 443
    key: [https]
  - service-names: [http, https]
    ports: [443, 8443, 18084, 31267]
    key: [https]
  - service-names: [http, https]
    port: 80
    key: [http]
  - service-names: [http, https, krb524]
    port: 4444
    key: [https]
  - service-names: [homepage, http]
    key: [http]
  - service-names: [homepage, http, https]
    key: [https]
  - service-names: [dc, https, www]
    key: [https]
  - service-names: [abyss, http]
    port: 9999
    key: [http]
  - service-names: [http, wsman]
    port: 5985
    key: [http]
  - service-names: [http, http-proxy]
    port: 5800
    key: [http]
  - service-names: [https, https-alt]
    port: 8443
    key: [https]
  - service-names: [https, wso2esb-console]
    port: 9444
    key: [https]
  - service-names: [https, powerchuteplus]
    port: 6547
    key: [https]
  - service-names: [accuracer, https]
    port: 12007
    key: [https]
  - service-names: [http-proxy, https]
    port: 8080
    key: [http/https/proxy]
  # Catch-all for remaining http+https conflicts
  - service-names: [http, https]
    key: [http/https]

# ── HTTP Proxy ────────────────────────────────────────────────────────────────
  - service-names: [http_proxy, https]
    key: [http_proxy]
  - service-names: [http-proxy, http_proxy]
    key: [http_proxy]
  - service-names: [http, http-proxy, http_proxy]
    key: [http_proxy]
  - service-names: [http, http_proxy, https]
    key: [http_proxy]
  - service-names: [http, http_proxy, squid-http]
    port: 3128
    key: [squid-http]
  - service-names: [http, http_proxy, https, opsmessaging]
    port: 8090
    key: [https]

# ── VNC ───────────────────────────────────────────────────────────────────────
